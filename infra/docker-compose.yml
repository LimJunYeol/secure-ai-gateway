services:
  postgres:
    image: postgres:16-alpine
    container_name: aigateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aigateway
      POSTGRES_USER: aigateway
      POSTGRES_PASSWORD: aigateway_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 나중에 추가 예정
  # redis:
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]
  
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports: ["6333:6333"]

volumes:
  postgres_data: